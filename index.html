  <script id="fig-badge-loader">
(() => {
  if (window.__FIG_BADGE_LOADER_V1__) return;
  window.__FIG_BADGE_LOADER_V1__ = true;

  function ensureStyles() {
    if (document.getElementById('fig-badge-style')) return;
    const style = document.createElement('style');
    style.id = 'fig-badge-style';
    style.textContent = [
      '.fig-made-on-badge {',
      '  position: fixed;',
      '  right: max(12px, env(safe-area-inset-right));',
      '  bottom: max(12px, env(safe-area-inset-bottom));',
      '  z-index: 2147483000;',
      '  display: inline-flex;',
      '  align-items: center;',
      '  gap: 8px;',
      '  border-radius: 9999px;',
      '  border: 1px solid rgba(15, 23, 42, 0.15);',
      '  background: #ffffff;',
      '  color: #0f172a;',
      '  text-decoration: none;',
      '  box-shadow: 0 8px 30px rgba(15, 23, 42, 0.14);',
      '  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;',
      '  font-size: 15px;',
      '  font-weight: 600;',
      '  line-height: 1;',
      '  padding: 12px 16px;',
      '}',
      '.fig-made-on-badge:hover {',
      '  transform: translateY(-1px);',
      '}',
      '.fig-made-on-badge__icon {',
      '  width: 20px;',
      '  height: 20px;',
      '  display: inline-flex;',
      '  align-items: center;',
      '  justify-content: center;',
      '}',
      '.fig-made-on-badge__icon svg {',
      '  width: 20px;',
      '  height: 20px;',
      '  display: block;',
      '}',
      '@media (max-width: 768px) {',
      '  .fig-made-on-badge {',
      '    font-size: 13px;',
      '    padding: 10px 14px;',
      '    gap: 6px;',
      '    right: max(10px, env(safe-area-inset-right));',
      '    bottom: max(10px, env(safe-area-inset-bottom));',
      '  }',
      '}',
    ].join('');
    document.head.appendChild(style);
  }

  function figMarkSvg() {
    return '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M13.3,3.75 L18.5,6.75 Q19.8,7.5 18.5,8.25 L13.3,11.25 Q12,12 10.7,11.25 L5.5,8.25 Q4.2,7.5 5.5,6.75 L10.7,3.75 Q12,3 13.3,3.75Z" fill="#8184D4" stroke="#B0B3E6" stroke-width="0.8"/>' +
      '<path d="M5.5,8.25 L10.7,11.25 Q12,12 12,13.5 L12,19.5 Q12,21 10.7,20.25 L5.5,17.25 Q4.2,16.5 4.2,15 L4.2,9 Q4.2,7.5 5.5,8.25Z" fill="#9298C0" stroke="#B8BCD6" stroke-width="0.8"/>' +
      '<path d="M13.3,11.25 L18.5,8.25 Q19.8,7.5 19.8,9 L19.8,15 Q19.8,16.5 18.5,17.25 L13.3,20.25 Q12,21 12,19.5 L12,13.5 Q12,12 13.3,11.25Z" fill="#88D8FC" stroke="#B0E4FC" stroke-width="0.8"/>' +
      '</svg>';
  }

  function renderBadge(badge) {
    if (!badge || !badge.href || document.getElementById('fig-made-on-badge')) {
      return;
    }

    ensureStyles();
    const link = document.createElement('a');
    link.id = 'fig-made-on-badge';
    link.className = 'fig-made-on-badge';
    link.href = String(badge.href);
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
    link.setAttribute('aria-label', 'Made on Fig');

    const icon = document.createElement('span');
    icon.className = 'fig-made-on-badge__icon';
    icon.innerHTML = figMarkSvg();

    const text = document.createElement('span');
    text.textContent = badge.text || 'Made on Fig';

    link.appendChild(text);
    link.appendChild(icon);
    document.body.appendChild(link);
  }

  function isPublishedHost(host) {
    const domain = "hellofig.app";
    if (!domain) return false;

    const normalizedHost = String(host || '').toLowerCase().replace(/\.$/, '');
    const normalizedDomain = String(domain).toLowerCase().replace(/\.$/, '');
    const suffix = '.' + normalizedDomain;
    if (!normalizedHost.endsWith(suffix)) return false;

    const slug = normalizedHost.slice(0, -suffix.length);
    return Boolean(slug) && !slug.includes('.');
  }

  function buildFallbackHref(host) {
    const baseUrl = "https://hellofig.io";
    try {
      const url = new URL(baseUrl);
      url.searchParams.set('utm_source', "fig_builder_badge");
      url.searchParams.set('utm_medium', "website_badge");
      url.searchParams.set('utm_campaign', "free_tier_published_sites");
      url.searchParams.set('utm_content', String(host || ''));
      return url.toString();
    } catch {
      return String(baseUrl || 'https://hellofig.io');
    }
  }

  async function loadConfig() {
    const apiBaseUrl = "https://nebula-platform-prod-442930206781.us-central1.run.app";
    const base = apiBaseUrl ? apiBaseUrl.replace(/\/$/, '') : window.location.origin;
    const host = window.location.hostname;
    const endpoint = base + '/api/public/badge-config?host=' + encodeURIComponent(host);
    // Only force fallback badge on known Fig-hosted subdomains.
    const shouldFallback = isPublishedHost(host);
    const fallbackBadge = { text: 'Made on Fig', href: buildFallbackHref(host) };
    // Keep this short so badge paint is not blocked behind slow public API responses.
    const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
    const timeoutId = setTimeout(() => {
      if (controller) controller.abort();
    }, 1300);

    try {
      const response = await fetch(endpoint, controller
        ? { method: 'GET', signal: controller.signal }
        : { method: 'GET' });
      if (!response.ok) {
        if (shouldFallback) renderBadge(fallbackBadge);
        return;
      }
      const payload = await response.json();
      if (!payload || payload.showBadge !== true) return;
      renderBadge(payload.badge || fallbackBadge);
    } catch {
      if (shouldFallback) renderBadge(fallbackBadge);
    } finally {
      clearTimeout(timeoutId);
    }
  }

  loadConfig();
})();
</script>
